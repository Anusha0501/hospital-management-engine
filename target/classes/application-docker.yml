spring:
  application:
    name: hospital-appointment-engine-docker
  
  datasource:
    url: jdbc:postgresql://postgres:5432/hospital_db
    username: hospital_user
    password: hospital_pass
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  
  redis:
    host: redis
    port: 6379
    database: 0
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms
  
  rabbitmq:
    host: rabbitmq
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    connection-timeout: 15000
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      retry:
        enabled: true
        initial-interval: 1000ms
        max-attempts: 3
        max-interval: 10000ms
        multiplier: 2

# Redisson Configuration for Docker
redisson:
  config: |
    singleServerConfig:
      address: redis://redis:6379
      timeout: 3000
      connectionPoolSize: 64
      connectionMinimumIdleSize: 10

# Application Configuration
hospital:
  appointment:
    slot-duration-minutes: 30
    working-hours-start: "09:00"
    working-hours-end: "18:00"
    max-booking-days-advance: 30
    lock-timeout-seconds: 30
    cache-ttl-seconds: 3600

# Logging Configuration
logging:
  level:
    com.hospital.appointment: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: /app/logs/application.log
